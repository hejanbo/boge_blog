server {
    listen 80;
    server_name jianbo.plus www.jianbo.plus;

    # HTTP 重定向 到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name jianbo.plus www.jianbo.plus;

    # SSL 配置
    ssl_certificate /etc/nginx/certs/jianbo_plus/jianbo.plus_bundle.pem;
    ssl_certificate_key /etc/nginx/certs/jianbo_plus/jianbo.plus.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!SHA1:!CAMELLIA:!ADH:!IDEA:!DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        # 将实际的域名添加到请求头中，用于 API 服务器识别, 不然代理后会被识别为 127.0.0.1
        proxy_set_header Host $host;
        # 用户的真实IP添加到请求头上, 用于 API 服务器识别, 否则代理后会被识别为 127.0.0.1
        proxy_set_header X-Real-IP $remote_addr;
        # 完整的ip链
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 协议, 不然用户看到的是http, 而不是实际的https
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
